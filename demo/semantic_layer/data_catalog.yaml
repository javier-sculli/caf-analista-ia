      - "Cerrar la brecha de inclusión"


# ============================================================================
# RELACIONES ENTRE TABLAS
# ============================================================================

relationships:
  - from_table: transferencias_inmediatas
    to_table: cheques
    join_type: LEFT JOIN
    join_condition: "transferencias_inmediatas.fecha = cheques.fecha"
    description: "Join mensual para comparar medios de pago electrónicos vs tradicionales"

  - from_table: transferencias_inmediatas
    to_table: inflacion
    join_type: LEFT JOIN
    join_condition: "transferencias_inmediatas.fecha = inflacion.fecha"
    description: "Join para ajustar montos por inflación (crecimiento real)"

  - from_table: inclusion_financiera
    to_table: inflacion
    join_type: LEFT JOIN
    join_condition: "inclusion_financiera.fecha = inflacion.fecha"
    description: "Join para contextualizar inclusión con entorno macro"


# ============================================================================
# CÁLCULOS COMUNES
# ============================================================================

common_calculations:
  - name: crecimiento_yoy
    description: "Crecimiento año sobre año (YoY) de una métrica"
    formula: "((valor_actual - valor_hace_12_meses) / valor_hace_12_meses) * 100"
    sql_template: "((LAG({column}, 12) OVER (ORDER BY fecha) - {column}) / LAG({column}, 12) OVER (ORDER BY fecha)) * 100"

  - name: crecimiento_real
    description: "Crecimiento ajustado por inflación"
    formula: "((valor_nominal / indice_inflacion) - 1) * 100"
    requires: ["inflacion.ipc_mensual_pct"]

  - name: promedio_movil
    description: "Promedio móvil de N períodos"
    sql_template: "AVG({column}) OVER (ORDER BY fecha ROWS BETWEEN {n} PRECEDING AND CURRENT ROW)"

  - name: deflactar
    description: "Convertir valores nominales a reales usando IPC base"
    requires: ["inflacion.ipc_mensual_pct"]
    formula: "valor_nominal * (ipc_base / ipc_actual)"


