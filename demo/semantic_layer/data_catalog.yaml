      - name: transferencias_inmediatas_cantidad
      - name: transferencias_inmediatas_monto
      - name: cheques_compensados_cantidad
      - name: cheques_compensados_monto
      - name: monto_electronico
        description: "Alias de transferencias_inmediatas_monto"
      - name: monto_tradicional
        description: "Alias de cheques_compensados_monto"
      - name: ratio_electronico_tradicional
        description: "Ratio entre monto electrónico y tradicional (>1 significa más electrónico)"

    common_questions:
      - "Comparar pagos electrónicos vs tradicionales"
      - "¿Los pagos digitales superan a los cheques?"
      - "Ratio entre transferencias y cheques"

