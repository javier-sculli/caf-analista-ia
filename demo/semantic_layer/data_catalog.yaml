  # --------------------------------------------------------------------------

  - name: transferencias_inmediatas
    schema: analytics
    description: "Serie mensual de transferencias inmediatas (push) en Argentina. Incluye cantidad y monto nominal de operaciones."
    source: "BCRA - Informe Mensual de Pagos Minoristas"
    update_frequency: "Mensual (último día del mes + 15 días hábiles)"
    granularity: "Mensual"
    time_column: fecha
    date_range:
      start: "2017-01-31"
      end: "2025-11-30"

    columns:
      - name: fecha
        type: DATE
        description: "Último día del mes reportado"
        searchable_terms: ["fecha", "periodo", "mes", "when", "cuándo"]

      - name: transferencias_inmediatas_cantidad
        type: INTEGER
        description: "Cantidad de transferencias inmediatas (push) realizadas en el mes"
        unit: "operaciones"
        searchable_terms: ["cantidad transferencias", "número de transferencias", "operaciones", "transacciones"]

